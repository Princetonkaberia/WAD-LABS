<!doctype html>
<html>
    <head>
    <meta charset="utf-8">
    <title>HTML Tables 101</title>
    </head>
    <body>
        <section id="simple-table">
            <h2>Simple Table</h2>
            <table border="1">
                <!-- the table heading region -->
                 <thead>
                    <!-- a row-->
                    <tr>
             
                        <!-- heading cell -->
                        <th>Adm. No</th>
                        <th>Name</th>
                        </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1234</td>
                        <td>James</td>
                    </tr>
                    <tr>
                        <td>4321</td>
                        <td>Opiyo</td>
                    </tr>
                </tbody>


                
            </table>
            <section id="course-table">
            <h2>Course Table</h2>
            <table border="1">
                <thead>
                    <tr>
                        <th>BBIT 1</th>
                        <th>BBIT 2</th>
                        <th>SEM 1</th>

                    </tr>
 
                </thead>
                <tbody>
                    <tr>
                        <td>OOP</td>
                        <td>Prog</td>
                        <td>1</td>
                    </tr>
                    <tr>
                        <td>DB</td>
                        <td>WAD</td>
                    </tr>
                    <tr>
                        <td>Ethics</td>
                        <td>PA</td>
                    </tr>
                        
                    
                </tbody>
            </table>
        </section>
